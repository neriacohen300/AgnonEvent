<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>יוצר תזכורות וואטסאפ</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #25D366;
            --primary-dark: #128C7E;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #333333;
        }

        * {
            box-sizing: border-box;
            font-family: 'Rubik', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 25px;
            color: var(--primary-dark);
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            font-size: 14px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 12px;
            font-size: 16px; /* מונע זום אוטומטי מעצבן באייפון */
            background: #fafafa;
            transition: all 0.2s;
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
            background: #fff;
            outline: none;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:active {
            background: var(--primary-dark);
        }

        /* מסך נעילה */
        #lock-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }

        #lock-screen .box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 350px;
        }

        .error-msg {
            color: #d32f2f;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <!-- מסך סיסמה -->
    <div id="lock-screen">
        <div class="box">
            <h2>כניסה למערכת</h2>
            <div class="form-group">
                <input type="password" id="password-input" placeholder="הקש סיסמה..." autocomplete="current-password">
            </div>
            <button onclick="checkPassword()">התחברות</button>
            <div class="error-msg" id="error-message">סיסמה שגויה, נסה שוב.</div>
        </div>
    </div>

    <!-- האתר הראשי -->
    <div class="container">
        <h1>יוצר תזכורות</h1>
        
        <div class="form-group">
            <label>שם ההרצאה</label>
            <input type="text" id="eventName" placeholder="למשל: סודות היקום">
        </div>

        <div class="row">
            <div class="form-group">
                <label>סוג ההרצאה</label>
                <input type="text" id="eventType" placeholder="למשל: הרצאת העשרה">
            </div>
            <div class="form-group">
                <label>מרצה</label>
                <input type="text" id="speaker" placeholder="שם המרצה">
            </div>
        </div>

        <div class="form-group">
            <label>תיאור קצר (ניתן להשתמש ב-*להדגשה*)</label>
            <textarea id="description" rows="3" placeholder="הסבר קצר על האירוע..."></textarea>
        </div>

        <div class="row">
            <div class="form-group">
                <label>תאריך לועזי</label>
                <input type="date" id="gregorianDate">
            </div>
            <div class="form-group">
                <label>שעה</label>
                <input type="time" id="eventTime">
            </div>
        </div>

        <div class="form-group">
            <label>מיקום (אופציונלי)</label>
            <input type="text" id="location" placeholder="השאר ריק אם אין">
        </div>

        <div class="form-group">
            <label>מחיר בש"ח (אופציונלי / השאר ריק לחינם)</label>
            <input type="number" id="price" placeholder="מחיר במספר">
        </div>

        <div class="form-group">
            <label>קישור להרשמה</label>
            <input type="url" id="regLink" placeholder="https://...">
        </div>

        <button onclick="generateAndCopy()">העתק נוסח לוואטסאפ</button>
    </div>

    <script>
        // המרת סיסמה ל-SHA256
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // --- הגדרת הסיסמה שלך ---
        // כרגע ה-Hash מייצג את הסיסמה הברירת מחדל: "1234"
        // בהמשך תחליף את השרשרת הזו בסיסמה המוצפנת שלך
        const CORRECT_PASSWORD_HASH = "fd573849d78eb68e5bced78f7d88ffabeef179942d2b3f62c5996c43b0e14191";

        async function checkPassword() {
            const input = document.getElementById('password-input').value;
            const hashedInput = await sha256(input);
            
            if (hashedInput === CORRECT_PASSWORD_HASH) {
                document.getElementById('lock-screen').style.display = 'none';
                // שמירת מצב זמנית ב-Session כדי שלא יבקש סיסמה בכל רענון קצר
                sessionStorage.setItem('authenticated', 'true');
            } else {
                document.getElementById('error-message').style.display = 'block';
            }
        }

        // בדיקה אם כבר התחבר בעבר בטאב הזה
        if (sessionStorage.getItem('authenticated') === 'true') {
            document.getElementById('lock-screen').style.display = 'none';
        }

        // האזנה למקש Enter במסך הסיסמה
        document.getElementById('password-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkPassword();
        });

        // פונקציה להבאת תאריך עברי מ-Hebcal API
        async function getHebrewDate(dateStr) {
            if (!dateStr) return "";
            try {
                const [year, month, day] = dateStr.split('-');
                const response = await fetch(`https://www.hebcal.com/converter?cfg=json&gy=${year}&gm=${month}&gd=${day}&g2h=1`);
                const data = await response.json();
                
                // ה-API מחזיר למשל "ז׳ בתמוז תשפ״ו". נוריד את המילה האחרונה (השנה)
                let hebParts = data.hebrew.split(' ');
                if (hebParts.length > 1) {
                    hebParts.pop(); // מסיר את השנה
                }
                // החלפת הגרש המיוחד של ה-API בגרש רגיל לבקשתך
                return hebParts.join(' ').replace(/׳/g, "'");
            } catch (e) {
                console.error("שגיאה בהבאת תאריך עברי", e);
                return "";
            }
        }

        async function generateAndCopy() {
            const eventName = document.getElementById('eventName').value;
            const eventType = document.getElementById('eventType').value;
            const speaker = document.getElementById('speaker').value;
            const description = document.getElementById('description').value;
            const dateVal = document.getElementById('gregorianDate').value;
            const timeVal = document.getElementById('eventTime').value;
            const locationVal = document.getElementById('location').value.trim();
            const priceVal = document.getElementById('price').value.trim();
            const regLink = document.getElementById('regLink').value.trim();

            if (!dateVal) {
                alert("חובה לבחור תאריך");
                return;
            }

            // חישוב יום בשבוע ותאריך לועזי בפורמט d.m
            const dateObj = new Date(dateVal);
            const daysOfWeek = ["ראשון", "שני", "שלישי", "רביעי", "חמישי", "שישי", "שבת"];
            const dayOfWeek = daysOfWeek[dateObj.getDay()];
            
            const dayOfMonth = dateObj.getDate();
            const monthOfYear = dateObj.getMonth() + 1;
            const formattedCurrentDate = `${dayOfMonth}.${monthOfYear}`;

            // הבאת התאריך העברי מהשרת
            const hebrewDate = await getHebrewDate(dateVal);

            // בניית שורת המיקום באופן מותנה
            let locationLine = "";
            if (locationVal) {
                locationLine = `*מיקום:*  ${locationVal}\n`;
            }

            // בניית שורת המחיר
            let priceLine = "";
            if (!priceVal || priceVal == "0") {
                priceLine = "*מחיר:* ההשתתפות בהרצאה חופשית, בהרשמה מראש.";
            } else {
                priceLine = `*מחיר:* ${priceVal}₪`;
            }

            // בניית הטקסט הסופי בדיוק לפי הפורמט שביקשת
            let message = `*${eventName} / ${eventType} עם ${speaker}*\n\n`;
            if (description) {
                message += `${description}\n\n`;
            }
            message += `*פרטי האירוע:*\n`;
            message += `*תאריך:* יום ${dayOfWeek}, ${hebrewDate}, ${formattedCurrentDate}\n`;
            message += `*שעה:* ${timeVal}\n`;
            if (locationLine) {
                message += locationLine;
            }
            message += `${priceLine}\n\n`;
            message += `*להרשמה ופרטים נוספים*👇\n`;
            message += `${regLink}`;

            // העתקה ללוח
            navigator.clipboard.writeText(message).then(() => {
                alert("הטקסט הועתק בהצלחה לוואטסאפ!");
            }).catch(err => {
                alert("שגיאה בהעתקה, נסה שוב");
            });
        }

        // הגדרת תאריך ברירת מחדל להיום כדי לחסוך זמן
        document.getElementById('gregorianDate').valueAsDate = new Date();
    </script>
</body>
</html>
